version: "3.8"

services:
  paperless-airscan:
    build: .
    image: paperless-airscan:latest
    container_name: paperless-airscan
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - SCANNER_HOST=${SCANNER_HOST:-}
      - SCANNER_TIMEOUT=${SCANNER_TIMEOUT:-30s}
      - SCANNER_DUPLEX=${SCANNER_DUPLEX:-true}
      - SCANNER_SOURCE=${SCANNER_SOURCE:-adf}
      - SCANNER_COLOR=${SCANNER_COLOR:-RGB24}
      - SCANNER_REORDER=${SCANNER_REORDER:-interleave}
      - PAPERLESS_URL=${PAPERLESS_URL}
      - PAPERLESS_TOKEN=${PAPERLESS_TOKEN}
      - SERVER_ADDR=:8080
      - FILING_ENABLED=${FILING_ENABLED:-true}
      - FILING_PAGE_THRESHOLD=${FILING_PAGE_THRESHOLD:-50}
      - FILING_PRINTER_HOST=${FILING_PRINTER_HOST:-}
      - DATABASE_PATH=/data/paperless-airscan.db
      - TEMP_DIR=/tmp/paperless-airscan
    volumes:
      - paperless-airscan-data:/data
    networks:
      - paperless-network

volumes:
  paperless-airscan-data:

networks:
  paperless-network:
    driver: bridge
